# ~/.config/fuzzel/fuzzel.ini
# Floating centered launcher with translucent dark surface. The `anchor=center`
# plus an explicit height keeps the overlay from stretching to the bottom of
# the screen.

font=JetBrainsMono Nerd Font:size=13
dpi-aware=yes
prompt=" "
icon-theme=Papirus-Dark
terminal=foot
layer=overlay
exit-on-keyboard-focus-loss=yes
fields=name,generic,comment,categories,filename,keywords
filter-desktop=no

width=42
lines=8
horizontal-pad=24
vertical-pad=18
inner-pad=10
line-height=28
anchor=center

[colors]
background=12131affe5
text=f5f6faff
match=a78bfaff
selection=a78bfa44
selection-text=ffffffff
selection-match=ffffffff
border=00000000

[border]
radius=18
width=0
