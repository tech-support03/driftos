#? Config file for btop — driftos rice (purple accent, translucent bg).

# Name of a btop theme file (without .theme).
color_theme = "driftos"

# Let the terminal background show through.
theme_background = False

# 24-bit true color (required for the accent gradients).
truecolor = True

# Rounded corners on boxes — matches the rest of the rice's 14–18px radii.
rounded_corners = True

# Smooth braille graph symbol.
graph_symbol = "braille"

vim_keys = False

# Polling interval in ms — 1500 keeps CPU usage of btop itself negligible
# without making the bars feel laggy.
update_ms = 1500

# Process box settings.
proc_sorting = "cpu lazy"
proc_reversed = False
proc_tree = False
proc_colors = True
proc_gradient = True
proc_per_core = False
proc_mem_bytes = True

# CPU box — show frequencies and per-core temps if available.
cpu_graph_upper = "total"
cpu_graph_lower = "total"
show_uptime = True
check_temp = True
cpu_sensor = "Auto"
show_coretemp = True
cpu_bottom = False
show_cpu_freq = True

# Memory box.
mem_graphs = True
show_swap = True
show_disks = True
only_physical = True
use_fstab = True
disks_filter = ""
show_io_stat = True
io_mode = False

# Network box.
net_download = 100
net_upload = 100
net_auto = True
net_sync = False
net_iface = ""

# No battery on this desktop.
show_battery = False
