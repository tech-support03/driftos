# /etc/greetd/regreet.toml — driftos login screen
# Matches the rice aesthetic: dark, translucent, lavender accent.
#
# NOTE: log_level / log_path / cache_path are top-level keys in regreet's
# config schema, NOT under a [file] section. Wrapping them caused the
# previous regreet build to either reject the file or silently ignore the
# overrides. The values here equal regreet's built-in defaults anyway, so
# this whole block is documentation only — left in for visibility into
# where regreet writes state.
#   log_path  default: /var/log/regreet.log
#   cache_path default: /var/cache/regreet/cache.toml
# (Both paths are pre-provisioned with greeter:greeter ownership by
#  modules/07-services.sh.)

[background]
# A wallpaper path that always exists is supplied by 09-wallpapers.sh.
# Override with your own file if you like; "Cover" keeps aspect ratio.
path = "/var/lib/regreet/wallpaper.jpg"
fit = "Cover"

[GTK]
application_prefer_dark_theme = true
cursor_theme_name = "Adwaita"
font_name = "Inter 11"
icon_theme_name = "Papirus-Dark"
theme_name = "adw-gtk3-dark"

[appearance]
greeting_msg = "  driftos"

[commands]
reboot   = ["systemctl", "reboot"]
poweroff = ["systemctl", "poweroff"]
