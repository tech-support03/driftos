# ~/.config/gtklock/config.ini — gtklock 4.0 (GTK3) lock screen.
# Symlinked from arch-setup/dotfiles/gtklock/. gtklock auto-loads this path,
# and the niri keybind/swayidle also pass it via -c to be explicit.
[main]
# Dark widget base — CLAUDE.md is dark-only.
gtk-theme=Adwaita-dark

# Lavender / aurora theme.
style=/home/arjun/.config/gtklock/style.css

# Custom layout: clock lives inside the reveal area (so it only shows on the
# focused/priority monitor), and the "Password:" label + Unlock button are
# suppressed. Enter submits.
layout=/home/arjun/.config/gtklock/layout.ui

# Pre-blurred copy of the CURRENT wallpaper, regenerated by
# wallpaper-init / wallpaper-next so the lock bg always tracks the desktop.
background=/home/arjun/.cache/lockscreen-bg.jpg

# Clock + date above the password field.
time-format=%-I:%M %p
date-format=%A · %B %-d

# Pin the unlock form to the main monitor and don't let it roam on focus
# change. The blurred background still covers every output.
follow-focus=false
monitor-priority=DP-1
