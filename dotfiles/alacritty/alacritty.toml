# ~/.config/alacritty/alacritty.toml

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
size = 11.0

[window]
padding = { x = 12, y = 10 }
opacity = 0.88
decorations = "None"

[cursor]
style = { shape = "Beam", blinking = "On" }

[colors.primary]
background = "#12131a"
foreground = "#f5f6fa"

[colors.normal]
black   = "#12131a"
red     = "#f87171"
green   = "#4ade80"
yellow  = "#facc15"
blue    = "#60a5fa"
magenta = "#c084fc"
cyan    = "#67e8f9"
white   = "#cbd5e1"

[colors.bright]
black   = "#475569"
red     = "#fb7185"
green   = "#86efac"
yellow  = "#fcd34d"
blue    = "#93c5fd"
magenta = "#d8b4fe"
cyan    = "#a5f3fc"
white   = "#f1f5f9"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
